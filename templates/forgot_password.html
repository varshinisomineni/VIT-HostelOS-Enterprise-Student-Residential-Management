{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.3rem;">Forgot Password</h2>
            <p class="subtitle" style="font-size: 0.9rem;">Recover your account</p>
        </div>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert" style="margin: 1rem; font-size: 0.9rem;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="mb-4">
                <label for="username" class="form-label" style="font-size: 0.9rem;">
                    <i class="fas fa-user"></i> Username
                </label>
                <input
                    id="username"
                    name="username"
                    class="form-control form-control-lg"
                    style="font-size: 1rem; padding: 0.6rem 0.8rem;"
                    placeholder="Enter username"
                    required>
                <small class="text-muted" style="font-size: 0.8rem; margin-top: 0.3rem; display: block;">
                    <i class="fas fa-info-circle"></i> We'll verify your identity
                </small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100" style="font-size: 0.95rem; padding: 0.6rem;">
                <i class="fas fa-arrow-right"></i> Continue
            </button>
        </form>

        <div class="auth-footer" style="padding: 1rem;">
            <p style="font-size: 0.9rem;">
                <a href="/login" class="auth-link">Login here</a>
            </p>
            <p style="font-size: 0.9rem;">
                <a href="/register" class="auth-link">Create account</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
