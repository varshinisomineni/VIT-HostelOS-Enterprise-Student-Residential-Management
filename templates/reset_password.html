{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 style="font-size: 1.5rem; margin-bottom: 0.3rem;">Reset Password</h2>
            <p class="subtitle" style="font-size: 0.9rem;">Create a new password</p>
        </div>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert" style="margin: 1rem; font-size: 0.9rem;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success alert-dismissible fade show" role="alert" style="margin: 1rem; font-size: 0.9rem;">
            <i class="fas fa-check-circle"></i> {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="mb-3">
                <label for="new_password" class="form-label" style="font-size: 0.9rem;">
                    <i class="fas fa-lock"></i> New Password
                </label>
                <input
                    id="new_password"
                    type="password"
                    name="new_password"
                    class="form-control form-control-lg"
                    style="font-size: 1rem; padding: 0.6rem 0.8rem;"
                    placeholder="Min 6 chars"
                    required
                    minlength="6">
                <small class="text-muted" style="font-size: 0.8rem;">Min 6 characters</small>
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label" style="font-size: 0.9rem;">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <input
                    id="confirm_password"
                    type="password"
                    name="confirm_password"
                    class="form-control form-control-lg"
                    style="font-size: 1rem; padding: 0.6rem 0.8rem;"
                    placeholder="Re-enter password"
                    required
                    minlength="6">
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100" style="font-size: 0.95rem; padding: 0.6rem; margin-bottom: 1rem;">
                <i class="fas fa-save"></i> Update Password
            </button>
        </form>

        <div class="auth-footer" style="padding: 1rem;">
            <p style="font-size: 0.9rem;">
                <a href="/login" class="auth-link">Back to Login</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
