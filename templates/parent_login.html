{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm border-0" style="border-radius: 12px;">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-friends fa-3x" style="color: #8b5cf6;"></i>
                        <h2 class="mt-3">Parent Login</h2>
                        <p class="text-muted">Welcome back! Please login to your account.</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="/parent/login">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3" style="background-color: #8b5cf6; border-color: #8b5cf6;">Login</button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0 text-muted">Don't have an account? <a href="/parent/register" style="color: #8b5cf6;">Register here</a></p>
                        <a href="/student_parent_hub" class="text-decoration-none d-block mt-2"><i class="fas fa-arrow-left"></i> Back to Hub</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
