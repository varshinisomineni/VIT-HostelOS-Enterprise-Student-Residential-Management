{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header"><h2>Reset Password</h2><p class="subtitle">Create a new password</p></div>
        {% if error %}<div class="alert alert-danger" style="margin:1rem;">{{ error }}</div>{% endif %}
        <form method="POST" class="auth-form">
            <div class="mb-3"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control form-control-lg" required minlength="6"></div>
            <div class="mb-4"><label class="form-label">Confirm Password</label><input type="password" name="confirm_password" class="form-control form-control-lg" required minlength="6"></div>
            <button type="submit" class="btn btn-success btn-lg w-100">Update Password</button>
        </form>
        <div class="auth-footer"><a href="/student/login" class="auth-link">Back to Login</a></div>
    </div>
</div>
{% endblock %}
