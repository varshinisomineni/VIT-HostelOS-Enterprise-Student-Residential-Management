{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header"><h2>Forgot Password</h2><p class="subtitle">Recover your student account</p></div>
        {% if error %}<div class="alert alert-danger" style="margin:1rem;">{{ error }}</div>{% endif %}
        <form method="POST" class="auth-form">
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-user"></i> Username</label>
                <input name="username" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100">Continue</button>
        </form>
        <div class="auth-footer"><a href="/student/login" class="auth-link">Back to Login</a></div>
    </div>
</div>
{% endblock %}
